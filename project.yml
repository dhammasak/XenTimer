name: XenTimer
options:
  bundleIdPrefix: com.tety
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  XenTimer:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: XenTimer
        excludes:
          - Resources/Info.plist
    resources:
      - XenTimer/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: XenTimer
        PRODUCT_BUNDLE_IDENTIFIER: com.tety.xentimer
        INFOPLIST_FILE: XenTimer/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: XenTimer/Resources/XenTimer.entitlements
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies: []

  XenTimerTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: XenTimerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tety.xentimer.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: XenTimer

schemes:
  XenTimer:
    build:
      targets:
        XenTimer: all
        XenTimerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - XenTimerTests
    archive:
      config: Release
